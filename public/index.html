<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>IPTV Dashboard</title>
<script src="/socket.io/socket.io.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#0d1117;--surface:#161b22;--surface2:#21262d;--border:#30363d;
  --text:#e6edf3;--muted:#7d8590;--green:#2ea043;--red:#f85149;
  --yellow:#e3b341;--blue:#58a6ff;--purple:#bc8cff;--accent:#25d366;
}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg);color:var(--text);min-height:100vh}

/* LOGIN */
#login{display:flex;align-items:center;justify-content:center;min-height:100vh;background:radial-gradient(ellipse at 50% 0%,#1a2535,var(--bg))}
.login-card{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:40px;width:340px;text-align:center}
.login-logo{font-size:52px;margin-bottom:12px}
.login-card h1{font-size:22px;margin-bottom:6px}
.login-card p{color:var(--muted);font-size:13px;margin-bottom:24px}
.inp{width:100%;padding:11px 14px;background:var(--surface2);border:1px solid var(--border);border-radius:8px;color:var(--text);font-size:14px;outline:none;margin-bottom:10px}
.inp:focus{border-color:var(--accent)}
.btn-login{width:100%;padding:11px;background:var(--accent);border:none;border-radius:8px;color:#000;font-size:15px;font-weight:700;cursor:pointer}
.err{color:var(--red);font-size:12px;margin-top:8px}

/* APP */
#app{display:none;flex-direction:column;min-height:100vh}

/* TOPBAR */
.topbar{background:var(--surface);border-bottom:1px solid var(--border);padding:14px 24px;display:flex;align-items:center;gap:14px;position:sticky;top:0;z-index:50}
.topbar-logo{font-size:22px}
.topbar h1{font-size:16px;font-weight:700;flex:1}
.wa-status{display:flex;align-items:center;gap:6px;font-size:12px;color:var(--muted)}
.dot{width:9px;height:9px;border-radius:50%;background:var(--red)}
.dot.on{background:var(--green);animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}

/* STATS */
.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;padding:20px 24px}
.stat{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:18px}
.stat-n{font-size:30px;font-weight:700}
.stat-n.yellow{color:var(--yellow)}
.stat-n.green{color:var(--green)}
.stat-n.blue{color:var(--blue)}
.stat-n.purple{color:var(--purple)}
.stat-l{font-size:12px;color:var(--muted);margin-top:4px}

/* TABS */
.tabs{display:flex;border-bottom:1px solid var(--border);padding:0 24px}
.tab{padding:11px 18px;font-size:13px;font-weight:500;color:var(--muted);cursor:pointer;border-bottom:2px solid transparent;transition:.15s;white-space:nowrap}
.tab.active{color:var(--accent);border-bottom-color:var(--accent)}
.tab-badge{background:var(--red);color:#fff;border-radius:10px;padding:1px 7px;font-size:11px;margin-left:5px;display:none}
.tab-badge.show{display:inline}

/* CONTENT */
.content{padding:20px 24px;flex:1}

/* PENDING CARDS */
.cards{display:flex;flex-direction:column;gap:14px}
.card{background:var(--surface);border:1px solid var(--border);border-radius:12px;overflow:hidden;animation:fadeIn .3s}
@keyframes fadeIn{from{opacity:0;transform:translateY(-8px)}to{opacity:1;transform:translateY(0)}}
.card.payment{border-left:3px solid var(--yellow)}
.card.trial{border-left:3px solid var(--green)}
.card.support{border-left:3px solid var(--red)}

.card-head{padding:14px 18px;display:flex;align-items:center;gap:12px;border-bottom:1px solid var(--border)}
.c-avatar{width:42px;height:42px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0}
.c-avatar.payment{background:rgba(227,179,65,.15)}
.c-avatar.trial{background:rgba(46,160,67,.15)}
.c-avatar.support{background:rgba(248,81,73,.15)}
.c-info{flex:1}
.c-name{font-weight:600;font-size:14px}
.c-phone{font-size:11px;color:var(--muted);margin-top:2px}
.c-label{font-size:11px;font-weight:600;padding:3px 10px;border-radius:20px}
.c-label.payment{background:rgba(227,179,65,.15);color:var(--yellow)}
.c-label.trial{background:rgba(46,160,67,.15);color:var(--green)}
.c-label.support{background:rgba(248,81,73,.15);color:var(--red)}
.c-time{font-size:11px;color:var(--muted)}

.card-body{padding:14px 18px;display:flex;gap:14px}
.proof-img{width:130px;height:90px;object-fit:cover;border-radius:8px;border:1px solid var(--border);cursor:pointer;flex-shrink:0}
.no-img{width:130px;height:90px;background:var(--surface2);border:1px dashed var(--border);border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:11px;color:var(--muted);text-align:center;flex-shrink:0}
.c-msg{font-size:13px;color:var(--muted);line-height:1.5;flex:1}

/* CREDENTIALS FORM */
.cred-form{padding:14px 18px;border-top:1px solid var(--border);background:var(--surface2)}
.form-title{font-size:12px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;margin-bottom:12px}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:8px}
.form-row.single{grid-template-columns:1fr}
.form-row.three{grid-template-columns:1fr 1fr 1fr}
.finp{width:100%;padding:9px 12px;background:var(--bg);border:1px solid var(--border);border-radius:7px;color:var(--text);font-size:13px;outline:none;font-family:monospace}
.finp:focus{border-color:var(--accent)}
.flabel{font-size:11px;color:var(--muted);margin-bottom:4px;display:block}
.fgroup{display:flex;flex-direction:column}
.fselect{width:100%;padding:9px 12px;background:var(--bg);border:1px solid var(--border);border-radius:7px;color:var(--text);font-size:13px;outline:none}
.fselect:focus{border-color:var(--accent)}

.form-actions{display:flex;gap:8px;margin-top:12px}
.btn-send{flex:1;padding:10px;background:var(--green);border:none;border-radius:8px;color:#fff;font-size:13px;font-weight:700;cursor:pointer}
.btn-send:hover{opacity:.85}
.btn-takeover{padding:10px 14px;background:transparent;border:1px solid var(--blue);border-radius:8px;color:var(--blue);font-size:13px;cursor:pointer}
.btn-takeover:hover{background:var(--blue);color:#fff}
.btn-reject{padding:10px 14px;background:transparent;border:1px solid var(--red);border-radius:8px;color:var(--red);font-size:13px;cursor:pointer}
.btn-reject:hover{background:var(--red);color:#fff}

/* MESSAGES */
.msg-list{display:flex;flex-direction:column;gap:10px}
.msg-item{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:14px 16px}
.msg-meta{display:flex;justify-content:space-between;margin-bottom:8px}
.msg-name{font-size:13px;font-weight:600}
.msg-phone{font-size:11px;color:var(--muted)}
.msg-time{font-size:11px;color:var(--muted)}
.msg-q{font-size:13px;color:var(--muted);margin-bottom:6px;padding:8px;background:var(--surface2);border-radius:6px}
.msg-a{font-size:13px;color:var(--text);padding:8px;background:rgba(37,211,102,.08);border-left:3px solid var(--accent);border-radius:6px}

/* EMPTY */
.empty{text-align:center;padding:50px 20px;color:var(--muted)}
.empty-icon{font-size:44px;margin-bottom:10px}

/* MODAL */
.modal{display:none;position:fixed;inset:0;background:rgba(0,0,0,.9);z-index:200;align-items:center;justify-content:center}
.modal.open{display:flex}
.modal img{max-width:90vw;max-height:90vh;border-radius:10px}
.modal-x{position:absolute;top:20px;right:20px;background:none;border:none;color:#fff;font-size:28px;cursor:pointer}

/* TOAST */
.toast{position:fixed;bottom:24px;right:24px;padding:12px 20px;border-radius:10px;font-weight:600;font-size:14px;transform:translateY(80px);opacity:0;transition:.3s;z-index:300;pointer-events:none}
.toast.show{transform:translateY(0);opacity:1}

/* CUSTOM MSG */
.custom-msg-bar{display:flex;gap:8px;margin-top:8px}
.custom-msg-inp{flex:1;padding:8px 12px;background:var(--bg);border:1px solid var(--border);border-radius:7px;color:var(--text);font-size:13px;outline:none}
.btn-custom-send{padding:8px 14px;background:var(--blue);border:none;border-radius:7px;color:#fff;font-size:13px;cursor:pointer}

@media(max-width:700px){
  .stats{grid-template-columns:1fr 1fr}
  .form-row{grid-template-columns:1fr}
  .form-row.three{grid-template-columns:1fr}
}
</style>
</head>
<body>

<!-- LOGIN -->
<div id="login">
  <div class="login-card">
    <div class="login-logo">📺</div>
    <h1>IPTV Dashboard</h1>
    <p>Gestion des paiements & activations</p>
    <input class="inp" type="password" id="passInp" placeholder="Mot de passe..." onkeydown="if(event.key==='Enter')doLogin()">
    <button class="btn-login" onclick="doLogin()">🔐 Connexion</button>
    <div class="err" id="loginErr"></div>
  </div>
</div>

<!-- APP -->
<div id="app">
  <div class="topbar">
    <div class="topbar-logo">📺</div>
    <h1>IPTV Support Dashboard</h1>
    <div class="wa-status">
      <div class="dot" id="waDot"></div>
      <span id="waStatus">Déconnecté</span>
    </div>
  </div>

  <div class="stats">
    <div class="stat"><div class="stat-n yellow" id="sWait">0</div><div class="stat-l">⏳ En attente</div></div>
    <div class="stat"><div class="stat-n green" id="sDone">0</div><div class="stat-l">✅ Envoyés aujourd'hui</div></div>
    <div class="stat"><div class="stat-n blue" id="sMsg">0</div><div class="stat-l">💬 Messages total</div></div>
    <div class="stat"><div class="stat-n purple" id="sClients">0</div><div class="stat-l">👥 Clients uniques</div></div>
  </div>

  <div class="tabs">
    <div class="tab active" onclick="showTab('pending')" id="t-pending">
      ⏳ En attente <span class="tab-badge" id="badge-pending">0</span>
    </div>
    <div class="tab" onclick="showTab('messages')" id="t-messages">💬 Messages</div>
    <div class="tab" onclick="showTab('done')" id="t-done">✅ Envoyés</div>
  </div>

  <div class="content">
    <div id="tab-pending"><div class="cards" id="pendingList"><div class="empty"><div class="empty-icon">🎉</div><p>Aucune action requise</p></div></div></div>
    <div id="tab-messages" style="display:none"><div class="msg-list" id="msgList"><div class="empty"><div class="empty-icon">💬</div><p>Aucun message</p></div></div></div>
    <div id="tab-done" style="display:none"><div class="msg-list" id="doneList"><div class="empty"><div class="empty-icon">✅</div><p>Aucune activation</p></div></div></div>
  </div>
</div>

<!-- IMAGE MODAL -->
<div class="modal" id="imgModal" onclick="closeModal()">
  <button class="modal-x">✕</button>
  <img id="modalImg" src="" alt="">
</div>

<!-- TOAST -->
<div class="toast" id="toast"></div>

<script>
let PASS = '';
let pending = {};
let done    = [];
let msgs    = [];
let clients = new Set();
let statDone = 0, statMsg = 0;

const socket = io();

// ── Login ────────────────────────────────────────────────────
function doLogin() {
  const p = document.getElementById('passInp').value;
  if (!p) return;
  PASS = p;
  document.getElementById('login').style.display = 'none';
  document.getElementById('app').style.display   = 'flex';
}

// ── Tabs ─────────────────────────────────────────────────────
function showTab(name) {
  ['pending','messages','done'].forEach(t => {
    document.getElementById(`tab-${t}`).style.display = t === name ? 'block' : 'none';
    document.getElementById(`t-${t === 'messages' ? 'messages' : t}`).classList.toggle('active', t === name);
  });
}

// ── Toast ─────────────────────────────────────────────────────
function showToast(msg, color = '#2ea043') {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.style.background = color;
  el.classList.add('show');
  setTimeout(() => el.classList.remove('show'), 3500);
}

// ── Modal ─────────────────────────────────────────────────────
function openModal(src) { document.getElementById('modalImg').src = src; document.getElementById('imgModal').classList.add('open'); }
function closeModal()   { document.getElementById('imgModal').classList.remove('open'); }

// ── Stats ─────────────────────────────────────────────────────
function updateStats() {
  const p = Object.keys(pending).length;
  document.getElementById('sWait').textContent   = p;
  document.getElementById('sDone').textContent   = statDone;
  document.getElementById('sMsg').textContent    = statMsg;
  document.getElementById('sClients').textContent = clients.size;
  const badge = document.getElementById('badge-pending');
  badge.textContent = p;
  badge.classList.toggle('show', p > 0);
}

// ── Render pending ────────────────────────────────────────────
function renderPending() {
  const list  = document.getElementById('pendingList');
  const items = Object.values(pending);
  if (!items.length) {
    list.innerHTML = '<div class="empty"><div class="empty-icon">🎉</div><p>Aucune action requise</p></div>';
    return;
  }
  list.innerHTML = items.map(p => {
    const id = p.phone.replace(/\W/g,'_');
    const emoji = p.type === 'payment' ? '💳' : p.type === 'trial' ? '🆓' : '🔧';
    return `
    <div class="card ${p.type}" id="card-${id}">
      <div class="card-head">
        <div class="c-avatar ${p.type}">${emoji}</div>
        <div class="c-info">
          <div class="c-name">${p.name}</div>
          <div class="c-phone">${p.phone}</div>
        </div>
        <span class="c-label ${p.type}">${p.label}</span>
        <span class="c-time">${new Date(p.timestamp).toLocaleTimeString('fr-FR',{hour:'2-digit',minute:'2-digit'})}</span>
      </div>

      <div class="card-body">
        ${p.imageData
          ? `<img class="proof-img" src="${p.imageData}" onclick="openModal('${p.imageData}')" title="Agrandir">`
          : `<div class="no-img">${p.type==='payment'?'📄 Message texte':'📝 Demande'}</div>`}
        <div class="c-msg">"${p.text || '(image envoyée)'}"
          <div class="custom-msg-bar">
            <input class="custom-msg-inp" id="custMsg-${id}" placeholder="Envoyer un message personnalisé...">
            <button class="btn-custom-send" onclick="sendCustom('${p.phone}','${id}')">Envoyer</button>
          </div>
        </div>
      </div>

      <div class="cred-form">
        <div class="form-title">🔑 Entrez les identifiants du client</div>
        <div class="form-row">
          <div class="fgroup">
            <label class="flabel">Forfait</label>
            <select class="fselect" id="forfait-${id}">
              <option value="Forfait Base — 29€ / 15 mois">📦 Base — 29€</option>
              <option value="Forfait Premium — 39€ / 15 mois" selected>⭐ Premium — 39€</option>
              <option value="Forfait Gold — 49€ / 15 mois">🥇 Gold — 49€</option>
              <option value="Forfait À Vie — 129€">♾️ À Vie — 129€</option>
              <option value="Accès Essai Gratuit">🆓 Essai gratuit</option>
            </select>
          </div>
          <div class="fgroup">
            <label class="flabel">Note (optionnel)</label>
            <input class="finp" id="note-${id}" placeholder="Ex: Bonne utilisation !">
          </div>
        </div>
        <div class="form-row">
          <div class="fgroup">
            <label class="flabel">Username *</label>
            <input class="finp" id="user-${id}" placeholder="username_client">
          </div>
          <div class="fgroup">
            <label class="flabel">Password *</label>
            <input class="finp" id="pwd-${id}" placeholder="password_client">
          </div>
        </div>
        <div class="form-row three">
          <div class="fgroup">
            <label class="flabel">URL 1 *</label>
            <input class="finp" id="url1-${id}" placeholder="http://..." value="http://bob33.xyz:80">
          </div>
          <div class="fgroup">
            <label class="flabel">URL 2</label>
            <input class="finp" id="url2-${id}" placeholder="http://..." value="http://alpha.cloudf-nexon.xyz:80">
          </div>
          <div class="fgroup">
            <label class="flabel">URL 3</label>
            <input class="finp" id="url3-${id}" placeholder="http://" value="http://pi.nexon-cdn.vip:80">
          </div>
        </div>
        <div class="form-actions">
          <button class="btn-send" onclick="sendCreds('${p.phone}','${id}')">✅ Envoyer les accès</button>
          <button class="btn-takeover" onclick="takeOver('${p.phone}')">👨‍💻 Prendre en main</button>
          <button class="btn-reject" onclick="rejectClient('${p.phone}')">❌ Rejeter</button>
        </div>
      </div>
    </div>`;
  }).join('');
}

// ── Send credentials ──────────────────────────────────────────
async function sendCreds(phone, id) {
  const username = document.getElementById(`user-${id}`).value.trim();
  const password = document.getElementById(`pwd-${id}`).value.trim();
  const url1     = document.getElementById(`url1-${id}`).value.trim();
  const url2     = document.getElementById(`url2-${id}`).value.trim();
  const url3     = document.getElementById(`url3-${id}`).value.trim();
  const forfait  = document.getElementById(`forfait-${id}`).value;
  const note     = document.getElementById(`note-${id}`).value.trim();

  if (!username || !password || !url1) {
    showToast('⚠️ Username, Password et URL 1 sont requis !', '#e3b341');
    return;
  }

  const res = await fetch('/api/send-credentials', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ phone, pass: PASS, username, password, urls: [url1, url2, url3], forfait, note })
  });
  const data = await res.json();

  if (data.ok) {
    showToast(`✅ Accès envoyés à ${phone} !`);
    statDone++;
    done.unshift({ phone, forfait, username, timestamp: new Date().toISOString() });
    delete pending[phone];
    updateStats();
    renderPending();
    renderDone();
  } else {
    showToast(`❌ Erreur: ${data.error}`, '#f85149');
  }
}

// ── Take over ─────────────────────────────────────────────────
async function takeOver(phone) {
  const res = await fetch('/api/take-over', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ phone, pass: PASS })
  });
  const data = await res.json();
  if (data.ok) {
    showToast(`👨‍💻 Prise en main confirmée, client notifié`);
    delete pending[phone];
    updateStats(); renderPending();
  } else {
    showToast(`❌ Erreur: ${data.error}`, '#f85149');
  }
}

// ── Reject ────────────────────────────────────────────────────
async function rejectClient(phone) {
  if (!confirm('Rejeter ce client ?')) return;
  const res = await fetch('/api/take-over', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ phone, pass: PASS, message: 'Bonjour, nous n\'avons pas pu vérifier votre paiement. Pouvez-vous nous renvoyer une preuve claire ? Merci 🙏' })
  });
  const data = await res.json();
  if (data.ok) {
    showToast('Client notifié du rejet', '#e3b341');
    delete pending[phone];
    updateStats(); renderPending();
  }
}

// ── Send custom message ───────────────────────────────────────
async function sendCustom(phone, id) {
  const msg = document.getElementById(`custMsg-${id}`).value.trim();
  if (!msg) return;
  const res = await fetch('/api/send-message', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ phone, pass: PASS, message: msg })
  });
  const data = await res.json();
  if (data.ok) {
    showToast('💬 Message envoyé !');
    document.getElementById(`custMsg-${id}`).value = '';
  }
}

// ── Render messages ───────────────────────────────────────────
function renderMessages() {
  const list = document.getElementById('msgList');
  if (!msgs.length) { list.innerHTML = '<div class="empty"><div class="empty-icon">💬</div><p>Aucun message</p></div>'; return; }
  list.innerHTML = msgs.slice(0,50).map(m => `
    <div class="msg-item">
      <div class="msg-meta">
        <div><div class="msg-name">${m.name||m.phone}</div><div class="msg-phone">${m.phone}</div></div>
        <div class="msg-time">${new Date(m.timestamp).toLocaleTimeString('fr-FR',{hour:'2-digit',minute:'2-digit'})}</div>
      </div>
      <div class="msg-q">👤 ${m.text}</div>
      <div class="msg-a">🤖 ${m.reply}</div>
    </div>`).join('');
}

// ── Render done ───────────────────────────────────────────────
function renderDone() {
  const list = document.getElementById('doneList');
  if (!done.length) { list.innerHTML = '<div class="empty"><div class="empty-icon">✅</div><p>Aucune activation</p></div>'; return; }
  list.innerHTML = done.map(d => `
    <div class="msg-item">
      <div class="msg-meta">
        <div class="msg-name">${d.phone}</div>
        <div class="msg-time">${new Date(d.timestamp).toLocaleTimeString('fr-FR',{hour:'2-digit',minute:'2-digit'})}</div>
      </div>
      <div class="msg-q">📦 ${d.forfait}</div>
      <div class="msg-a">👤 Username: ${d.username} · ✅ Codes envoyés</div>
    </div>`).join('');
}

// ── Socket ────────────────────────────────────────────────────
socket.on('wa_status', s => {
  document.getElementById('waDot').classList.toggle('on', s === 'connected');
  document.getElementById('waStatus').textContent = s === 'connected' ? 'WhatsApp connecté ✅' : 'Déconnecté ⚠️';
});

socket.on('new_pending', p => {
  pending[p.phone] = p;
  clients.add(p.phone);
  statMsg++;
  updateStats();
  renderPending();
  showToast(`🔔 ${p.label} — ${p.name||p.phone}`, p.type==='payment'?'#e3b341':p.type==='trial'?'#2ea043':'#f85149');
  // Notification browser
  if (Notification.permission === 'granted') {
    new Notification('IPTV Dashboard', { body: `${p.label} de ${p.name||p.phone}`, icon: '📺' });
  }
});

socket.on('new_message', m => {
  msgs.unshift(m);
  clients.add(m.phone);
  statMsg++;
  updateStats();
  renderMessages();
});

socket.on('credentials_sent', ({ phone }) => {
  delete pending[phone];
  updateStats(); renderPending();
});

socket.on('human_takeover', ({ phone }) => {
  delete pending[phone];
  updateStats(); renderPending();
});

// Request browser notifications permission
if (Notification.permission === 'default') Notification.requestPermission();
</script>
